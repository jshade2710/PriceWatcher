name: Build and Release

on:
  push:
    branches: [master]
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download Dalamud
        run: |
          mkdir -p "$HOME/.xlcore/dalamud/Hooks/dev"
          wget https://goatcorp.github.io/dalamud-distrib/latest.zip -O /tmp/dalamud.zip
          unzip /tmp/dalamud.zip -d "$HOME/.xlcore/dalamud/Hooks/dev"

      - name: Restore
        run: dotnet restore PriceWatcher/PriceWatcher.csproj

      - name: Build
        run: dotnet build PriceWatcher/PriceWatcher.csproj --no-restore --configuration Release

      - name: Show build output
        run: find PriceWatcher/bin -type f | sort

      - name: Package
        run: |
          PLUGIN_DIR=$(find PriceWatcher/bin -name "PriceWatcher.dll" | head -1 | xargs dirname)
          echo "Packaging from: $PLUGIN_DIR"
          echo "=== Manifest ===" && cat "$PLUGIN_DIR/PriceWatcher.json" || echo "No manifest found"
          cd "$PLUGIN_DIR"
          zip -r "$GITHUB_WORKSPACE/PriceWatcher.zip" .

      - name: Sync repo.json from manifest
        run: |
          PLUGIN_DIR=$(find PriceWatcher/bin -name "PriceWatcher.dll" | head -1 | xargs dirname)
          MANIFEST="$PLUGIN_DIR/PriceWatcher.json"
          python3 - <<'EOF'
          import json, os
          manifest_path = os.environ.get('MANIFEST', '')
          manifest_path = os.popen("find PriceWatcher/bin -name 'PriceWatcher.json' | head -1").read().strip()
          with open(manifest_path) as f:
              manifest = json.load(f)
          with open('repo.json') as f:
              repo = json.load(f)
          repo[0]['DalamudApiLevel'] = manifest.get('DalamudApiLevel', repo[0]['DalamudApiLevel'])
          repo[0]['AssemblyVersion'] = manifest.get('AssemblyVersion', repo[0]['AssemblyVersion'])
          with open('repo.json', 'w') as f:
              json.dump(repo, f, indent=2)
          print(f"repo.json updated: DalamudApiLevel={repo[0]['DalamudApiLevel']}, AssemblyVersion={repo[0]['AssemblyVersion']}")
          EOF

      - name: Commit updated repo.json
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repo.json
          git diff --staged --quiet || git commit -m "chore: sync repo.json for ${{ github.ref_name }} [skip ci]"
          git push origin HEAD:master

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PriceWatcher
          path: PriceWatcher.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            PriceWatcher.zip
