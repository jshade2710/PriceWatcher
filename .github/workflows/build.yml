name: Build and Release

on:
  push:
    branches: [master]
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download Dalamud
        run: |
          mkdir -p "$HOME/.xlcore/dalamud/Hooks/dev"
          wget https://goatcorp.github.io/dalamud-distrib/latest.zip -O /tmp/dalamud.zip
          unzip /tmp/dalamud.zip -d "$HOME/.xlcore/dalamud/Hooks/dev"

      - name: Restore
        run: dotnet restore PriceWatcher/PriceWatcher.csproj

      - name: Build
        run: dotnet build PriceWatcher/PriceWatcher.csproj --no-restore --configuration Release

      - name: Package
        run: |
          cd PriceWatcher/bin/x64/Release
          zip -r ../../../../PriceWatcher.zip .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PriceWatcher
          path: PriceWatcher.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            PriceWatcher.zip
